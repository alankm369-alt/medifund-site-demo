<!DOCTYPE html>
<html>
<head>
    <title>MedFund App</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            text-align: center;
            overflow: hidden;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 100px auto;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            
            opacity: 0;
            transform: translateY(30px);
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(45deg, #00b09b, #00c9a7);
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus {
            border-color: #00b09b;
            outline: none;
            box-shadow: 0 0 5px rgba(0,176,155,0.5);
        }

        .hidden {
            display: none;
        }

    </style>
</head>

<body>

<!-- HOME -->
<div class="box" id="home">
    <h2>💊 MedFund</h2>
    <h3>Wallet Balance</h3>
    <p id="balance">₹0</p>

    <button onclick="goToPayment()">Add Money</button>
    <button onclick="emergency()">Emergency Request</button>
</div>

<!-- PAYMENT -->
<div class="box hidden" id="payment">
    <h3>Enter Amount</h3>
    <input type="number" id="amount" placeholder="Enter amount">
    <button onclick="nextStep()">Next</button>
</div>

<!-- UPI -->
<div class="box hidden" id="upi">
    <h3>Enter UPI ID</h3>
    <input type="text" placeholder="example@upi">
    <button>Proceed</button>
    <p>✅ Demo only</p>
</div>

<script>
function switchPage(hide, show) {
    document.getElementById(hide).classList.add("hidden");

    let next = document.getElementById(show);
    next.classList.remove("hidden");

    // restart animation
    next.style.animation = "none";
    next.offsetHeight;
    next.style.animation = "fadeIn 0.6s ease forwards";
}

function goToPayment() {
    switchPage("home", "payment");
}

function nextStep() {
    let amount = document.getElementById("amount").value;

    if (amount > 0) {
        switchPage("payment", "upi");
    } else {
        alert("Enter valid amount!");
    }
}

function emergency() {
    window.open("https://docs.google.com/forms/d/e/1FAIpQLSdF8uvWdWYX8SZtuFWQbD00H-jN-Os7wSm3xnriti_bUzVN5Q/viewform","_blank");
}
</script>

</body>
</html>
